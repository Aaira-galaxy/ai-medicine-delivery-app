<!DOCTYPE html>
<html>
<head>
  <title>AI Medicine App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    .container {
      margin-top: 100px;
    }
    input {
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px 15px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💊 AI Medicine Assistant</h1>

  <input type="text" id="medicine" placeholder="Enter medicine name">
  <br><br>

  <button onclick="getExplanation()">Explain</button>

  <div id="result"></div>
</div>

<script>
async function getExplanation() {
  const medicine = document.getElementById("medicine").value;

  const response = await fetch("http://127.0.0.1:5000/explain-medicine", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ medicine })
  });

  const data = await response.json();

  document.getElementById("result").innerText = data.explanation;
}
</script>

</body>
</html>
